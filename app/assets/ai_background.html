<style>

#ai-bg{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;

pointer-events:none;

background:
radial-gradient(circle at 15% 20%, rgba(56,189,248,0.35), transparent 40%),
radial-gradient(circle at 85% 40%, rgba(37,99,235,0.35), transparent 40%),
radial-gradient(circle at 50% 85%, rgba(14,165,233,0.35), transparent 45%),
#020617;

z-index:-100;

animation: aiPulse 14s ease-in-out infinite alternate;

will-change: transform, opacity;
}

@keyframes aiPulse{

0%{filter:blur(40px);opacity:0.55;}
50%{filter:blur(65px);opacity:0.75;}
100%{filter:blur(85px);opacity:0.9;}

}

</style>
